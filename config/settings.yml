# =============================================================================
# Open DQA — Application Configuration
# config/settings.yml
# =============================================================================
# Copy this file to config/settings.yml and adjust values for your institution.
# Do NOT commit API keys or SMTP passwords to version control.
# Store secrets in environment variables or .Renviron (see docs/installation.md).
# =============================================================================

# ── Threshold Settings ────────────────────────────────────────────────────────
thresholds:
  completeness_warning: 0.95       # Warn if field completeness falls below 95%
  completeness_critical: 0.80      # Critical alert if completeness below 80%
  max_patient_age: 125             # Maximum plausible patient age in years
  min_patient_age: 0               # Minimum plausible patient age in years
  max_los: 365                     # Maximum plausible length of stay (days)
  max_procedures_per_case: 50      # Trigger COM-012 anomaly above this count
  founding_year: 1900              # Hospital founding year (for TMP-014)

# ── Date Parsing ─────────────────────────────────────────────────────────────
dates:
  format: "YYYY-MM-DD"             # Primary date format: ISO 8601 recommended
  # Alternatives: "DD.MM.YYYY" | "MM/DD/YYYY" | "YYYYMMDD"
  timezone: "Europe/Berlin"        # IANA timezone for datetime calculations

# ── Coding System ─────────────────────────────────────────────────────────────
coding:
  icd_version: "ICD-10-GM-2024"    # ICD-10-GM-2024 | ICD-10-CM-2024
  ops_version: "OPS-2024"          # OPS-2024 | ICD-9-CM-PCS
  gender_codes:                    # Map source gender values to M/F/D/U
    male:    ["M", "1", "male", "männlich", "homme"]
    female:  ["F", "2", "female", "weiblich", "femme"]
    diverse: ["D", "3", "divers", "divers", "divers"]
    unknown: ["U", "0", "unknown", "unbekannt", "inconnu"]

# ── Reporting ─────────────────────────────────────────────────────────────────
reporting:
  default_language: "en"           # en | de | fr
  institution_name: "Your Institution Name"
  logo_path: "assets/logo.png"     # Replace with your institutional logo
  report_author: ""                # Name printed in report footer
  include_affected_records: true   # Include affected record detail in reports
  max_affected_rows_in_report: 500 # Cap affected records shown in report


# ── Session Logging ───────────────────────────────────────────────────────────
logging:
  enabled: true
  log_path: "logs/session_log.csv"
  log_level: "info"                # debug | info | warning | error

# ── Performance ───────────────────────────────────────────────────────────────
performance:
  profiling_enabled: false         # Enable profvis performance monitoring
  slow_check_threshold_ms: 1000    # Flag checks slower than 1 second
  max_upload_size_mb: 500          # Maximum file upload size
